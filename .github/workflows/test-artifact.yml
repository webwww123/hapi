name: Build Test Artifact

on:
    workflow_dispatch:

jobs:
    build-linux-x64:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - run: bun install
            - run: bun run build:single-exe
            - name: Package linux-x64 artifact
              run: |
                  mkdir -p cli/test-artifacts
                  artifact_dir="$(find cli/dist-exe -maxdepth 1 -type d -name 'bun-linux-x64*' | head -n 1)"
                  test -n "$artifact_dir"
                  tar -czf cli/test-artifacts/hapi-linux-x64-test.tar.gz -C "$artifact_dir" hapi
            - name: Upload linux-x64 artifact
              uses: actions/upload-artifact@v4
              with:
                  name: hapi-linux-x64-test
                  path: cli/test-artifacts/hapi-linux-x64-test.tar.gz
